<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Flask Blog</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <h1>Welcome to My Flask Blog!</h1>
    <div class="toolbar">
        <a class="btn" href="{{ url_for('add') }}">Add New Post</a>
    </div>

    {% if posts %}
        {% for post in posts %}
            <div class="post">
                <h2>{{ post['title'] }}</h2>
                <p><em>Written by {{ post['author'] }}</em></p>
                <p>{{ post['content'] }}</p>
                <div class="actions">
                    <a class="btn btn-secondary" href="{{ url_for('update', post_id=post['id']) }}">Edit</a>
                    <a class="btn btn-danger" href="{{ url_for('delete', post_id=post['id']) }}">Delete</a>
                </div>
            </div>
        {% endfor %}
    {% else %}
        <p class="empty-state">No blog posts yet. Create your first one.</p>
    {% endif %}
</body>
</html>
